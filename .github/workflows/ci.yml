name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Governance Gates
        run: |
          python .github/scripts/validate_governance.py \
            --exceptions .github/governance/exceptions.json \
            --check-template .github/PULL_REQUEST_TEMPLATE.md \
            --repo-root . \
            --self-test
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            python .github/scripts/validate_governance.py \
              --exceptions .github/governance/exceptions.json \
              --check-template .github/PULL_REQUEST_TEMPLATE.md \
              --validate-pr-event "${GITHUB_EVENT_PATH}" \
              --repo-root . \
              --require-test-reference-exists
          fi

      - name: Format
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Phase 6 Collection and RegExp Gates
        run: |
          cargo test -p vm weak_collection_constructor_identity -- --exact
          cargo test -p vm collection_semantics_same_value_zero_and_live_iteration -- --exact
          cargo test -p vm regexp_last_index_transition_matrix -- --exact
          cargo test -p vm regexp_exec_capture_and_constructor_errors -- --exact
          cargo test -p test-harness --test collection_semantics
          cargo test -p test-harness --test regexp_semantics
          cargo test -p test-harness --test test262_lite collection_and_regexp_subset -- --exact

      - name: GC Guard Stress Gate
        run: cargo run -p test-harness --bin test262-run -- --root crates/test-harness/fixtures/test262-lite --auto-gc --auto-gc-threshold 1 --runtime-gc --runtime-gc-interval 1 --show-gc --expect-gc-baseline crates/test-harness/fixtures/test262-lite/gc-guard.baseline

      - name: Compatibility Snapshot Manifest
        run: |
          python .github/scripts/run_compat_snapshot.py \
            --phase 07 \
            --milestone v1.0 \
            --manifest docs/compatibility/phase7-snapshots.json \
            --output-dir target/compatibility \
            --allow-dirty
